services:
  app:
    build: .
    ports:
      - '8080:80'
    environment:
      - VUE_APP_PUBLIC_PATH=${VUE_APP_PUBLIC_PATH:-/}
      - VUE_APP_CLIENT_ID=${VUE_APP_CLIENT_ID}
      # Client secret is consumed by nginx (40-create-ghcred.sh) for the
      # server-side token exchange; it is never shipped in the SPA bundle.
      - CLIENT_SECRET=${CLIENT_SECRET}
      - VUE_APP_CALL_BACK=${VUE_APP_CALL_BACK:-http://localhost:8080/myAppPlaceholder/callback}
