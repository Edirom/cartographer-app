version: "3"
services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    volumes:
      - docs_html:/usr/share/nginx/html:ro   # share built site (populated from image)

  front:
    build: nginx-ghcred
    ports:
      - 8082:8082
    volumes:
      - ./docker-nginx.conf/docker-nginx.conf:/etc/nginx/conf.d/default.conf
      - docs_html:/usr/share/nginx/docs:ro   # mount same files under /docs
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
    depends_on:
      - webpack
      - docs

  webpack:
    build: node-ghcred 
    volumes:
      - ./:/usr/app/
    environment:
      - CLIENT_ID=${CLIENT_ID}
    working_dir: /usr/app/
    command: "npm run serve -- --port 8082"

volumes:
  docs_html:
