services:
  front:
    build:
      context: .
      dockerfile: Dockerfile        # your existing nginx front Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./docker-nginx.conf/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
    depends_on:
      - webpack

  webpack:
    build:
      context: ./node-ghcred
    volumes:
      - ./:/usr/app/
    working_dir: /usr/app/
    command: npm run serve -- --port 8080
