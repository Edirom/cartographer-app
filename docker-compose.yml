version: "3"
services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile.docs
    # RW so the named volume is populated from the built image
    volumes:
      - docs_html:/usr/share/nginx/html

  front:
    build:
      context: .    # or "." if your Dockerfile is at repo root
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    volumes:
      - ./docker-nginx.conf/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - docs_html:/usr/share/nginx/docs:ro
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
    depends_on:
      - webpack
      - docs

  webpack:
    build:
      context: ./node-ghcred       # if this is a directory with a Dockerfile
    volumes:
      - ./:/usr/app/
    environment:
      - CLIENT_ID=${CLIENT_ID}
    working_dir: /usr/app/
    command: npm run serve -- --port 8082

volumes:
  docs_html:
