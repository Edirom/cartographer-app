# ---------- Upgrade map ----------
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 8080 default_server reuseport;
  listen [::]:80;
  server_name localhost;
  resolver 127.0.0.11 ipv6=off;

  # Injected by 40-create-ghcred.sh at container start
  include "/GH_OAUTH_CLIENT.conf";
  include "/APP_PUBLIC_PATH.conf";

  # ---------- GitHub OAuth token exchange ----------
  # Proxies /auth to GitHub OAuth access_token endpoint and forces JSON
  set $token "";
  if ($is_args) { set $token "&"; }

  location = /auth {
    set $args "${args}${token}client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}";
    proxy_pass https://github.com/login/oauth/access_token$is_args$args;
    proxy_set_header accept "application/json";
  }

  # ---------- VuePress docs (static) ----------
  location = /docs { return 301 /docs/; }
  location ^~ /docs/ {
    alias /usr/share/nginx/docs/;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # ---------- Always expose the build base assets ----------
  # Your app is built with publicPath: "/myAppPlaceholder"
  # Only assets live here; SPA index is served at /
  location ^~ /myAppPlaceholder/ {
    alias /usr/share/nginx/html/;
    index index.html;
    try_files $uri $uri/ /index.html;
  }


  # ---------- Root (SPA) ----------
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
