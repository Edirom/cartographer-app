worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  server {
    listen 80;
    server_name _;

    # Use absolute redirects (but we control port via $redirect_host)
    absolute_redirect off;
    #port_in_redirect off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Runtime variables set by 40-create-ghcred.sh (PUBLIC_PATH, CLIENT_ID, CLIENT_SECRET)
    include /GH_OAUTH_CLIENT.conf;

    # DNS resolver so nginx can reach github.com at request time
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # GitHub sends large OAuth response headers
    proxy_buffer_size           128k;
    proxy_buffers               4 256k;
    proxy_busy_buffers_size     256k;
    large_client_header_buffers 4 16k;

    # $is_args prepends "?" to any variable, so only start the extra args with
    # "&" when the incoming request already carries a query string.
    set $token "";
    if ($is_args) { set $token "&"; }

    # ----------------------------------------------------------
    # 0) GitHub OAuth token exchange (no sidecar)
    # ----------------------------------------------------------
    # The browser calls /auth?code=<code>. nginx appends the client_id and
    # client_secret (injected at container start from env vars) and proxies to
    # GitHub's token endpoint. The secret never reaches the browser.
    location = /myAppPlaceholder/auth {
      set $args "${args}${token}client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}";
      proxy_pass https://github.com/login/oauth/access_token$is_args$args;
      proxy_set_header accept "application/json";
    }

    # ----------------------------
    # 1) Documentation
    # ----------------------------
    location /myAppPlaceholder/docs/ {
      try_files $uri $uri/ /myAppPlaceholder/docs/404.html;
    }

    # ----------------------------
    # 2) Cartographer App
    # ----------------------------
    location /myAppPlaceholder/ {
      try_files $uri $uri/ /index.html;
    }
  }
}
