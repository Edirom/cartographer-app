worker_processes auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Preserve client port in Host for redirects
  map $http_host $redirect_host {
      ~:\d+$  $http_host;  # Host already has :port, keep it
      default $host;       # Otherwise, just hostname
  }

  server {
    listen 80;
    server_name _;

    # Use absolute redirects (but we control port via $redirect_host)
    absolute_redirect on;
    port_in_redirect off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Runtime variables set by 40-create-ghcred.sh
    include /GH_OAUTH_CLIENT.conf;

    # ----------------------------
    # 1) Redirect /docs and /<subpath>/docs to trailing slash
    # ----------------------------
    # Handle exactly /docs without redirect
    location = /docs {
      rewrite ^ $uri/ last;     # internally rewrite to /docs/
    }

    # Handle /<subpath>/docs without redirect
    location ~ ^/[^/]+/docs$ {
      rewrite ^ $uri/ last;     # internally rewrite to /xxx/docs/
    }


    # ----------------------------
    # 2) Handle /docs/... (root, no subpath)
    # ----------------------------
    location ^~ /docs/ {
      try_files $uri $uri/ /docs/404.html;
    }
    # ----------------------------
    # 4) Internal trailing-slash add for SPA routes (no redirect!)
    # ----------------------------
    # Prevents default 308 when /demo is a real directory.
    location ~ ^/(?!.*\.).*[^/]$ {
      rewrite ^(.*)$ $1/ last;
    }

    # ----------------------------
    # 3) Handle /<subpath>/docs/... when subpath is used
    # ----------------------------
    location ~ ^/[^/]+/docs/(.*)$ {
      try_files $uri $uri/ /docs/404.html;
    }


    # ----------------------------
    # 5) Root "/" redirect if subpath is set
    # ----------------------------
    location = / {
      if ($HAS_SUBPATH) {
        return 302 $scheme://$redirect_host$PUBLIC_PATH/;
      }
      try_files /index.html =404;
    }

    # ----------------------------
    # 6) SPA fallback
    # ----------------------------
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
