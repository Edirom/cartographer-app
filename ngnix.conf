server {
  listen 80;
  server_name _;

  root   /usr/share/nginx/html;
  index  index.html;

  # entrypoint writes: set $PUBLIC_PATH ""; set $HAS_SUBPATH 0|1;
  include /GH_OAUTH_CLIENT.conf;

  # ----------------------------------------------------
  # 1) Redirect /docs and /<subpath>/docs to trailing slash
  # ----------------------------------------------------

  # Root-level /docs -> /docs/
  location = /docs {
    if ($HAS_SUBPATH) {
      return 308 $scheme://$http_host$PUBLIC_PATH/docs/;
    }
    return 308 $scheme://$http_host/docs/;
  }

  # Subpath-level /<subpath>/docs -> /<subpath>/docs/
  location ~ ^/([^/]+)/docs$ {
    return 308 $scheme://$http_host/$1/docs/;
  }

  # ----------------------------------------------------
  # 2) Handle /docs/... (root, no subpath)
  # ----------------------------------------------------
  location ^~ /docs/ {
    # Serve actual files or directories
    # If nothing found, show VuePress 404.html
    try_files $uri $uri/ /docs/404.html;
  }

  # ----------------------------------------------------
  # 3) Handle /<subpath>/docs/... when subpath is used
  # ----------------------------------------------------
  # /<subpath> maps to / on disk.
  location ~ ^/[^/]+/docs/(.*)$ {
    try_files $uri $uri/ /docs/404.html;
  }

  # ----------------------------------------------------
  # 4) Root "/" redirect if subpath is set
  # ----------------------------------------------------
  location = / {
    if ($HAS_SUBPATH) {
      return 302 $scheme://$http_host$PUBLIC_PATH/;  # preserves :8080 etc.
    }
    try_files /index.html =404;
  }

  # ----------------------------------------------------
  # 5) Main SPA fallback for the Vue app
  # ----------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }
}
